openapi: 3.1.0
info:
  title: shrt API
  description: |
    JSON API for the shrt URL shortener: link management, authentication, and
    the public redirect endpoint. See docs/API.md for the prose reference.
  version: "1.0.0"
  license:
    name: MIT
    url: https://github.com/sukhera/shrt/blob/main/LICENSE
servers:
  - url: http://localhost:8080
    description: Local development

# No authentication by default; operations that require a token override this
# with their own `security: [bearerAuth: []]`.
security: []

tags:
  - name: auth
    description: Registration, login, token refresh, and logout
  - name: links
    description: Create and manage short links
  - name: redirect
    description: Public slug resolution
  - name: system
    description: Health and operational endpoints

paths:
  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Create an account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "201":
          description: Account created with an initial token pair
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterResponse" }
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "409":
          description: Email already registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Log in
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "200":
          description: Authenticated; returns a token pair
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401":
          $ref: "#/components/responses/InvalidCredentials"

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh the access token (rotates the refresh token)
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Revoke a refresh token
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        "204":
          description: Logged out (idempotent)
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/links:
    post:
      tags: [links]
      summary: Shorten a URL
      description: >
        Authentication is optional. With a valid Bearer token the link is owned
        by the user; otherwise it is anonymous. Rate limited.
      operationId: createLink
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateLinkInput" }
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Link" }
        "409":
          description: Alias already taken
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Invalid or unsafe URL
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          $ref: "#/components/responses/RateLimited"
    get:
      tags: [links]
      summary: List the authenticated user's links
      operationId: listLinks
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: sort
          in: query
          schema: { type: string, enum: [created_at, expires_at], default: created_at }
        - name: order
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: q
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated list of links
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListLinksResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/links/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [links]
      summary: Get a link
      operationId: getLink
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The link
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Link" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/LinkNotFound"
    patch:
      tags: [links]
      summary: Update a link
      description: >
        Send any subset of fields. Send expires_at as null to clear an existing
        expiry.
      operationId: updateLink
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateLinkInput" }
      responses:
        "200":
          description: The updated link
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Link" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/LinkNotFound"
        "409":
          description: Alias already taken
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: Invalid or unsafe URL
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [links]
      summary: Delete a link (soft delete)
      operationId: deleteLink
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/LinkNotFound"

  /{slug}:
    get:
      tags: [redirect]
      summary: Resolve a slug to its destination
      operationId: redirect
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "301":
          description: Permanent redirect (no expiry, DEFAULT_REDIRECT_CODE=301)
          headers:
            Location: { schema: { type: string, format: uri } }
        "302":
          description: Temporary redirect (default, or any link with an expiry)
          headers:
            Location: { schema: { type: string, format: uri } }
        "404":
          description: Unknown or deleted slug
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "410":
          description: The link has expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /health:
    get:
      tags: [system]
      summary: Health check (DB + Redis connectivity)
      operationId: health
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
        "503":
          description: A dependency is unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256-signed access token; subject claim is the user ID.

  responses:
    Unauthorized:
      description: Missing, invalid, or expired token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    InvalidCredentials:
      description: Bad credentials or password too short
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    LinkNotFound:
      description: No such link, or not owned by the caller
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Credentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }

    RegisterResponse:
      type: object
      properties:
        user: { $ref: "#/components/schemas/User" }
        access_token: { type: string }
        refresh_token: { type: string }

    TokenPair:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in:
          type: integer
          description: Access-token lifetime in seconds
          example: 3600

    Link:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string, example: abc1234 }
        short_url: { type: string, format: uri }
        original_url: { type: string, format: uri }
        is_custom: { type: boolean }
        expires_at:
          type: [string, "null"]
          format: date-time
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateLinkInput:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
        alias:
          type: string
          description: Optional custom slug; random base62 if omitted
        expires_at:
          type: [string, "null"]
          format: date-time

    UpdateLinkInput:
      type: object
      description: Any subset of fields. expires_at=null clears the expiry.
      properties:
        url: { type: string, format: uri }
        alias: { type: string }
        expires_at:
          type: [string, "null"]
          format: date-time

    Pagination:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }

    ListLinksResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Link" }
        pagination: { $ref: "#/components/schemas/Pagination" }

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Stable machine-readable identifier
              example: ALIAS_TAKEN
            message: { type: string }
            status: { type: integer }
